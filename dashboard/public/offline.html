<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Octop — 离线中</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e7e7ed;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 40px 24px;
        max-width: 360px;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        margin: 0 auto 24px;
        display: block;
        opacity: 0.9;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 10px;
        color: #f08b9a;
      }
      p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.7;
        margin-bottom: 28px;
      }
      button {
        padding: 10px 28px;
        border-radius: 999px;
        border: none;
        background: #e85d75;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #d14a62;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="logo.svg" alt="Octop" class="logo" />
      <h1>当前处于离线状态</h1>
      <p>无法连接到 Octop 服务端。<br />请检查网络连接后重试。</p>
      <button onclick="location.reload()">重新连接</button>
    </div>
  </body>
</html>
