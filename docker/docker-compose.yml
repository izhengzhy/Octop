# =============================================================================
# Octop — Docker Compose
#
# 用法（在仓库根目录执行）:
#   docker compose -f docker/docker-compose.yml up -d
#   OCTOP_PORT=9090 docker compose -f docker/docker-compose.yml up -d
#   OCTOP_DEFAULT_PASSWORD=mypass docker compose -f docker/docker-compose.yml up -d
#
# 可在 docker/ 目录放置 .env 文件，例如:
#   OCTOP_PORT=9090
#   OCTOP_DEFAULT_PASSWORD=mypass
#   OCTOP_ADMIN_USERNAME=admin
# =============================================================================

services:
  octop:
    build:
      context: ..
      dockerfile: Dockerfile
    image: octop:latest
    container_name: octop
    restart: unless-stopped
    ports:
      - "${OCTOP_PORT:-8088}:${OCTOP_PORT:-8088}"
    volumes:
      - ${OCTOP_DATA:-~/.octop}:/data/.octop
    environment:
      - HOME=/data
      - OCTOP_BIND_HOST=0.0.0.0
      - OCTOP_PORT=${OCTOP_PORT:-8088}
      - OCTOP_LOG_LEVEL=${OCTOP_LOG_LEVEL:-info}
      - OCTOP_DEFAULT_PASSWORD=${OCTOP_DEFAULT_PASSWORD:-octop}
      - OCTOP_ADMIN_USERNAME=${OCTOP_ADMIN_USERNAME:-admin}
      - OCTOP_ADMIN_DISPLAY_NAME=${OCTOP_ADMIN_DISPLAY_NAME:-Admin}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - OCTOP_LANGFUSE_ENABLED=${OCTOP_LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}
